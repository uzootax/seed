<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기출 분류표</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f8;color:#1a1a1a;}
.pg{display:none;flex-direction:column;min-height:100vh;}
.pg.on{display:flex;}
#p1{height:100vh;}
.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:100%;}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:filter .15s;padding:32px;gap:8px;position:relative;border:.5px solid rgba(0,0,0,.08);}
.cell:hover{filter:brightness(.95);}
.cn{font-size:12px;font-weight:500;opacity:.5;}
.ct{font-size:28px;font-weight:600;}
.cs{font-size:13px;opacity:.45;font-style:italic;text-align:center;}
.ca{position:absolute;bottom:14px;right:16px;font-size:14px;opacity:.2;}
.hdr{display:flex;align-items:center;padding:10px 16px;border-bottom:.5px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:10;}
.back{background:none;border:.5px solid #ddd;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;color:#555;display:flex;align-items:center;gap:3px;flex-shrink:0;margin-right:8px;}
.back:hover{background:#f5f5f5;}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:100px;flex-shrink:0;}
.harrow{font-size:13px;color:#bbb;margin:0 6px;}
.hnav{display:flex;align-items:center;overflow-x:auto;flex:1;}
.hnav::-webkit-scrollbar{display:none;}
.hsec{font-size:12px;font-weight:500;cursor:pointer;padding:3px 8px;border-radius:6px;white-space:nowrap;color:#666;}
.hsec:hover{background:#f5f5f5;}
.hdiv{font-size:13px;color:#ddd;padding:0 2px;}
.ebtn{font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;border:.5px solid #ddd;background:transparent;color:#555;margin-left:8px;flex-shrink:0;}
.ebtn.on{background:#1a1a1a;color:#fff;border-color:transparent;}
.hint{font-size:11px;color:#999;padding:5px 16px;display:none;background:#fafafa;border-bottom:.5px solid #eee;}
.edit-mode .hint{display:block;}
.tw{overflow-y:auto;flex:1;background:#fff;}
.sb{padding:0 0 4px;}
.sh{display:flex;align-items:center;gap:8px;padding:12px 16px 5px;}
.sl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.acb{font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer;border:.5px dashed #ddd;background:transparent;color:#999;display:none;align-items:center;gap:2px;margin-left:auto;}
.edit-mode .acb{display:flex;}
.sd{height:.5px;background:#eee;margin:4px 0;}
table{border-collapse:collapse;font-size:12px;width:100%;}
th,td{border:.5px solid #e5e5e5;}
.ty{width:48px;min-width:48px;text-align:center;font-weight:600;font-size:11px;color:#888;padding:8px 4px;background:#fafafa;}
.tc{min-width:100px;padding:0;vertical-align:top;position:relative;}
.cl-wrap{padding:5px 6px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.cl{text-align:center;font-size:11.5px;font-weight:600;line-height:1.4;word-break:keep-all;min-height:28px;outline:none;width:100%;}
.cl[contenteditable="true"]{cursor:text;background:rgba(255,255,255,0.6);}
.cl-wrap.has-link{cursor:pointer;}
.cl-wrap.has-link:hover{filter:brightness(1.12);}
.cl-wrap.has-link .cl::after{content:' 🔗';font-size:9px;opacity:0;transition:opacity .15s;}
.cl-wrap.has-link:hover .cl::after{opacity:.7;}
.col-acts{display:flex;align-items:center;gap:3px;justify-content:center;}
.lbtn{font-size:10px;padding:2px 5px;border-radius:4px;border:.5px solid #ddd;background:transparent;cursor:pointer;display:none;align-items:center;gap:2px;color:#999;}
.lbtn:hover{background:#f5f5f5;}
.lbtn.has-link{color:#1D4ED8;border-color:#93C5FD;background:#EFF6FF;}
.edit-mode .lbtn{display:inline-flex;}
.dcb{font-size:10px;padding:2px 5px;border-radius:4px;border:.5px solid #ddd;background:transparent;cursor:pointer;display:none;align-items:center;color:#999;}
.dcb:hover{color:rgba(200,0,0,0.8);}
.edit-mode .dcb{display:inline-flex;}
.ry{text-align:center;font-size:11px;font-weight:600;color:#888;padding:6px 4px;background:#fafafa;white-space:nowrap;}
.rc{padding:5px;vertical-align:middle;text-align:left;min-height:34px;cursor:pointer;}
.rc.dh{background:rgba(55,138,221,.1);}
.sw{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-start;align-items:center;padding-left:19px;}
.sym{width:16px;height:16px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;cursor:pointer;font-size:11px;}
.sym:hover .tip{display:block;}
.sym.sel{outline:2px solid #378ADD;outline-offset:1px;}
.sym.has-own-link{outline:1px dashed #F59E0B;outline-offset:1px;}
.tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:999;pointer-events:none;line-height:1.4;min-width:80px;text-align:center;}
.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1a1a1a;}
.dsb{background:rgba(0,0,0,0.5);border:none;color:white;font-size:9px;cursor:pointer;display:none;position:absolute;top:-3px;right:-3px;border-radius:50%;width:11px;height:11px;align-items:center;justify-content:center;padding:0;}
.edit-mode .dsb{display:flex;}
.sym-link-btn{display:none;position:absolute;bottom:-3px;right:-3px;background:#1D4ED8;border:none;color:white;font-size:8px;cursor:pointer;border-radius:50%;width:11px;height:11px;align-items:center;justify-content:center;padding:0;}
.edit-mode .sym-link-btn{display:flex;}
.asb{width:16px;height:16px;border-radius:3px;border:.5px dashed #ddd;background:transparent;cursor:pointer;font-size:11px;color:#bbb;display:none;align-items:center;justify-content:center;}
.edit-mode .asb{display:inline-flex;}
.ayb{font-size:11px;color:#bbb;background:none;border:.5px dashed #ddd;border-radius:6px;padding:3px 10px;cursor:pointer;margin:6px;display:none;align-items:center;gap:3px;}
.edit-mode .ayb{display:inline-flex;}

/* 모달 공통 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:14px;padding:20px;width:320px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.modal label{font-size:11px;color:#888;display:block;margin-bottom:4px;margin-top:10px;}
.modal input[type=text]{width:100%;border:.5px solid #ddd;border-radius:6px;padding:7px 10px;font-size:13px;outline:none;}
.modal input[type=text]:focus{border-color:#aaa;}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.mbtn{font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer;border:.5px solid #ddd;background:transparent;color:#555;}
.mbtn:hover{background:#f5f5f5;}
.mbtn.primary{background:#1a1a1a;color:#fff;border-color:transparent;}
.mbtn.primary:hover{background:#333;}

/* 색상 선택 */
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.selected{border-color:#1a1a1a;}

/* 이모지 픽커 */
.emoji-section{margin-top:8px;}
.emoji-cat-label{font-size:10px;color:#aaa;margin:8px 0 4px;font-weight:500;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px;}
.emoji-btn{width:30px;height:30px;border-radius:6px;border:.5px solid #eee;background:#fafafa;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .1s;}
.emoji-btn:hover{background:#f0f0f0;}
.emoji-btn.selected{background:#EFF6FF;border-color:#93C5FD;}
.emoji-input-row{display:flex;gap:6px;align-items:center;margin-top:8px;}
.emoji-input-row input{flex:1;border:.5px solid #ddd;border-radius:6px;padding:5px 8px;font-size:13px;outline:none;}
.emoji-preview{font-size:20px;width:32px;text-align:center;}

/* 1페이지 편집 버튼 */
.p1-edit-btn{position:fixed;bottom:16px;right:16px;background:#1a1a1a;color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.2);}

#toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;font-size:12px;padding:8px 14px;border-radius:8px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="toast">✓ 저장됨</div>

<!-- 1페이지 설정 모달 -->
<div class="modal-bg" id="p1modal">
  <div class="modal">
    <h3>📌 카테고리 설정</h3>
    <label>카테고리 번호</label>
    <div style="font-size:13px;color:#aaa" id="editCatNum"></div>
    <label>이름</label>
    <input type="text" id="editCatName" placeholder="예: 총칙">
    <label>부제목</label>
    <input type="text" id="editCatSub" placeholder="예: 법률행위·의사표시">
    <label>배경 색상</label>
    <div class="color-grid" id="catColorGrid"></div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeP1Modal()">취소</button>
      <button class="mbtn primary" onclick="saveP1Modal()">저장</button>
    </div>
  </div>
</div>

<!-- 열 추가 모달 -->
<div class="modal-bg" id="colModal">
  <div class="modal">
    <h3>열 추가</h3>
    <label>열 이름</label>
    <input type="text" id="colName" placeholder="예: 법률행위">
    <label>심볼 색상</label>
    <div class="color-grid" id="colColorGrid"></div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeColModal()">취소</button>
      <button class="mbtn primary" onclick="saveColModal()">추가</button>
    </div>
  </div>
</div>

<!-- 토픽 추가 모달 (이모지 픽커) -->
<div class="modal-bg" id="chipModal">
  <div class="modal" style="width:360px">
    <h3>토픽 추가</h3>
    <label>이름</label>
    <input type="text" id="chipName" placeholder="예: 법률행위의 종류">
    <label>심볼 이모지 (선택)</label>
    <div class="emoji-section" id="emojiSection"></div>
    <div class="emoji-input-row">
      <span class="emoji-preview" id="emojiPreview">■</span>
      <input type="text" id="emojiCustom" placeholder="직접 입력" maxlength="2">
    </div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeChipModal()">취소</button>
      <button class="mbtn primary" onclick="saveChipModal()">추가</button>
    </div>
  </div>
</div>

<button class="p1-edit-btn" id="p1EditBtn" title="카테고리 편집">⚙️</button>

<div class="pg on" id="p1">
  <div class="grid" id="p1grid"></div>
</div>

<div class="pg" id="p2">
  <div class="hdr">
    <button class="back" id="backBtn"><i class="ti ti-arrow-left"></i> 뒤로</button>
    <span class="badge" id="p2b"></span>
    <span class="harrow">>></span>
    <div class="hnav" id="hnav"></div>
    <button class="ebtn" id="ebt"><i class="ti ti-edit"></i> 편집</button>
  </div>
  <div class="hint">💡 열 제목 클릭 → 블로그 이동 / 편집: 🔗 링크설정, ■ 선택 후 이동</div>
  <div class="tw" id="tw"></div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {getFirestore,doc,getDoc,setDoc} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

var firebaseConfig={
  apiKey:'AIzaSyClPnElzTh0I8ZGOoMDOfWMVKKVzLS5BiQ',
  authDomain:'uzootax.firebaseapp.com',
  projectId:'uzootax',
  storageBucket:'uzootax.firebasestorage.app',
  messagingSenderId:'467976725281',
  appId:'1:467976725281:web:f60a944f474a3362bf9460'
};
var _fbapp=initializeApp(firebaseConfig);
var _db=getFirestore(_fbapp);
var DOC_ID='adminlaw';
var DOC_REF=doc(_db,'study',DOC_ID);

var STORAGE_KEY='study_template_v1';

// ── 색상 팔레트 ──
var PALETTES=[
  {bg:'#FDEBD0',text:'#7D4A1A',sym:'#C2410C',label:'살구'},
  {bg:'#D5EEE8',text:'#1A5C4A',sym:'#15803D',label:'민트'},
  {bg:'#FEFBD0',text:'#6B6200',sym:'#B45309',label:'레몬'},
  {bg:'#DFF2D0',text:'#2A5C1A',sym:'#166534',label:'초록'},
  {bg:'#EEF2FF',text:'#3730A3',sym:'#1D4ED8',label:'블루'},
  {bg:'#FDF4FF',text:'#7E22CE',sym:'#7E22CE',label:'보라'},
  {bg:'#FFF1F2',text:'#9F1239',sym:'#BE123C',label:'핑크'},
  {bg:'#F0F9FF',text:'#0369A1',sym:'#0369A1',label:'하늘'},
  {bg:'#F5F5F5',text:'#444',sym:'#555',label:'회색'},
  {bg:'#FFF7ED',text:'#C2410C',sym:'#EA580C',label:'오렌지'},
];

// ── 이모지 카테고리 ──
var EMOJI_CATS=[
  {label:'■ 기본',emojis:['■','●','◆','▲','★','♦']},
  {label:'🙂 사람',emojis:['👤','👥','🧑','👩','👨','🧒','🧑‍⚖️','🧑‍🏫','👮','🧑‍💼']},
  {label:'📦 사물',emojis:['📚','📖','📝','📌','📎','🔑','⚖️','🏛','📜','🗂']},
  {label:'🔢 숫자·기호',emojis:['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩']},
  {label:'🔷 도형',emojis:['🔴','🟠','🟡','🟢','🔵','🟣','🔶','🔷','🔸','🔹']},
  {label:'😊 감정',emojis:['✅','❌','⚠️','💡','🔥','❄️','💎','🎯','⭐','🏆']},
  {label:'🌍 우주·자연',emojis:['🌍','🌙','⭐','☀️','🌊','🌈','🌿','🍃','🌸','🦋']},
];

// ── 기본 데이터 (깡통) ──
var DEFAULT_CATS=[
  {label:'1',name:'분류 1',sub:'부제목을 입력하세요',palIdx:0,sections:[
    {id:'s0',icon:'📜',label:'섹션 1',sc:'#1e3a8a',
      cols:[{n:'열 1',palIdx:4,url:''}],
      years:[{y:"25'",cells:[[]]}]},
  ]},
  {label:'2',name:'분류 2',sub:'부제목을 입력하세요',palIdx:1,sections:[
    {id:'s1',icon:'📖',label:'섹션 1',sc:'#065f46',
      cols:[{n:'열 1',palIdx:1,url:''}],
      years:[{y:"25'",cells:[[]]}]},
  ]},
  {label:'3',name:'분류 3',sub:'부제목을 입력하세요',palIdx:2,sections:[
    {id:'s2',icon:'⚙️',label:'섹션 1',sc:'#b45309',
      cols:[{n:'열 1',palIdx:2,url:''}],
      years:[{y:"25'",cells:[[]]}]},
  ]},
  {label:'4',name:'분류 4',sub:'부제목을 입력하세요',palIdx:3,sections:[
    {id:'s3',icon:'🏛',label:'섹션 1',sc:'#14532d',
      cols:[{n:'열 1',palIdx:3,url:''}],
      years:[{y:"25'",cells:[[]]}]},
  ]},
];

async function loadData(){
  try{
    var snap=await getDoc(DOC_REF);
    if(snap.exists()){
      var d=snap.data();
      if(d.catsJson)return JSON.parse(d.catsJson);
    }
  }catch(e){console.error('load error',e);}
  return JSON.parse(JSON.stringify(DEFAULT_CATS));
}
var _tt=null;
function showToast(m){
  var t=document.getElementById('toast');t.textContent=m||'✓ 저장됨';t.classList.add('show');
  if(_tt)clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},1500);
}
async function saveData(){
  try{await setDoc(DOC_REF,{catsJson:JSON.stringify(cats)});showToast('✓ 저장됨');}
  catch(e){showToast('⚠ 저장실패: '+e.message);}
}

var cats=JSON.parse(JSON.stringify(DEFAULT_CATS));
var cur=0,editMode=false,sel=null,selSec=null;
var _modalSi=null,_modalCi=null,_editCatIdx=null;
var _selectedPalIdx=0,_selectedEmoji='■';

// ── chip helpers ──
function chipLabel(c){return typeof c==='string'?c:(c.l||'?');}
function chipEmoji(c){return typeof c==='string'?'■':(c.e||'■');}
function chipUrl(c){return typeof c==='string'?'':c.url||'';}
function chipSym(c){return typeof c==='string'?null:c.sym||null;}
function resolveUrl(sec,ci,chip){return chipUrl(chip)||sec.cols[ci].url||'';}

// ── 1페이지 렌더 ──
function renderP1(){
  var grid=document.getElementById('p1grid');
  grid.innerHTML=cats.map(function(cat,i){
    var pal=PALETTES[cat.palIdx%PALETTES.length];
    var pos=[0,2,1,3][i]; // 배치순서: 좌상,우상,좌하,우하
    return '<div class="cell" data-cat="'+i+'" style="background:'+pal.bg+';color:'+pal.text+';order:'+pos+';border:.5px solid rgba(0,0,0,.08)">'+
      '<span class="cn">'+cat.label+'</span>'+
      '<span class="ct">'+cat.name+'</span>'+
      '<span class="cs">'+cat.sub+'</span>'+
      '<i class="ti ti-chevron-right ca"></i></div>';
  }).join('');
  grid.querySelectorAll('.cell').forEach(function(el){
    el.addEventListener('click',function(){goCat(parseInt(this.dataset.cat));});
  });
}

// ── 1페이지 설정 모달 ──
var _editCatColors=['#FDEBD0','#D5EEE8','#FEFBD0','#DFF2D0','#EEF2FF','#FDF4FF','#FFF1F2','#F0F9FF','#F5F5F5','#FFF7ED'];
function openP1Modal(){
  // 어느 카테고리 편집할지 선택
  var idx=parseInt(prompt('편집할 분류 번호 (1~4)','1'));
  if(isNaN(idx)||idx<1||idx>4)return;
  _editCatIdx=idx-1;
  var cat=cats[_editCatIdx];
  document.getElementById('editCatNum').textContent='분류 '+cat.label;
  document.getElementById('editCatName').value=cat.name;
  document.getElementById('editCatSub').value=cat.sub;
  _selectedPalIdx=cat.palIdx||0;
  renderColorGrid('catColorGrid',_selectedPalIdx,function(i){_selectedPalIdx=i;});
  document.getElementById('p1modal').classList.add('show');
}
function closeP1Modal(){document.getElementById('p1modal').classList.remove('show');}
function saveP1Modal(){
  var cat=cats[_editCatIdx];
  cat.name=document.getElementById('editCatName').value.trim()||cat.name;
  cat.sub=document.getElementById('editCatSub').value.trim()||cat.sub;
  cat.palIdx=_selectedPalIdx;
  saveData();renderP1();closeP1Modal();
}

// ── 색상 그리드 ──
function renderColorGrid(containerId,selectedIdx,onSelect){
  var el=document.getElementById(containerId);
  el.innerHTML=PALETTES.map(function(p,i){
    return '<div class="color-swatch'+(i===selectedIdx?' selected':'')+'" style="background:'+p.bg+';border-color:'+(i===selectedIdx?p.text:'transparent')+'" data-idx="'+i+'" title="'+p.label+'"></div>';
  }).join('');
  el.querySelectorAll('.color-swatch').forEach(function(sw){
    sw.addEventListener('click',function(){
      selectedIdx=parseInt(this.dataset.idx);
      onSelect(selectedIdx);
      el.querySelectorAll('.color-swatch').forEach(function(s,i){
        s.classList.toggle('selected',i===selectedIdx);
        s.style.borderColor=i===selectedIdx?PALETTES[i].text:'transparent';
      });
    });
  });
}

// ── 열 추가 모달 ──
var _colPalIdx=0;
function openColModal(si){
  _modalSi=si;_colPalIdx=0;
  document.getElementById('colName').value='';
  renderColorGrid('colColorGrid',_colPalIdx,function(i){_colPalIdx=i;});
  document.getElementById('colModal').classList.add('show');
  setTimeout(function(){document.getElementById('colName').focus();},100);
}
function closeColModal(){document.getElementById('colModal').classList.remove('show');}
function saveColModal(){
  var n=document.getElementById('colName').value.trim();
  if(!n)return;
  var sec=cats[cur].sections[_modalSi];
  sec.cols.push({n:n,palIdx:_colPalIdx,url:''});
  sec.years.forEach(function(r){r.cells.push([]);});
  saveData();renderP2();closeColModal();
}

// ── 이모지 픽커 ──
function renderEmojiPicker(){
  var sec=document.getElementById('emojiSection');
  sec.innerHTML=EMOJI_CATS.map(function(cat){
    return '<div class="emoji-cat-label">'+cat.label+'</div>'+
      '<div class="emoji-grid">'+cat.emojis.map(function(e){
        return '<button class="emoji-btn'+(e===_selectedEmoji?' selected':'')+'" data-e="'+e+'">'+e+'</button>';
      }).join('')+'</div>';
  }).join('');
  sec.querySelectorAll('.emoji-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      _selectedEmoji=this.dataset.e;
      document.getElementById('emojiPreview').textContent=_selectedEmoji;
      document.getElementById('emojiCustom').value='';
      sec.querySelectorAll('.emoji-btn').forEach(function(b){b.classList.toggle('selected',b.dataset.e===_selectedEmoji);});
    });
  });
}
function openChipModal(si,yi,ci){
  _modalSi=si;_modalCi={yi:yi,ci:ci};
  _selectedEmoji='■';
  document.getElementById('chipName').value='';
  document.getElementById('emojiPreview').textContent='■';
  document.getElementById('emojiCustom').value='';
  renderEmojiPicker();
  document.getElementById('chipModal').classList.add('show');
  setTimeout(function(){document.getElementById('chipName').focus();},100);
}
function closeChipModal(){document.getElementById('chipModal').classList.remove('show');}
function saveChipModal(){
  var n=document.getElementById('chipName').value.trim();
  if(!n)return;
  var custom=document.getElementById('emojiCustom').value.trim();
  var emoji=custom||_selectedEmoji;
  var yi=_modalCi.yi,ci=_modalCi.ci;
  var sec=cats[cur].sections[_modalSi];
  if(!sec.years[yi].cells[ci])sec.years[yi].cells[ci]=[];
  sec.years[yi].cells[ci].push({l:n,e:emoji,url:''});
  saveData();renderP2();closeChipModal();
}
document.getElementById('emojiCustom').addEventListener('input',function(){
  if(this.value){_selectedEmoji=this.value;document.getElementById('emojiPreview').textContent=this.value;}
});

// ── 내비 ──
function go(p){
  document.querySelectorAll('.pg').forEach(function(x){x.classList.remove('on');});
  document.getElementById('p'+p).classList.add('on');
  document.getElementById('p1EditBtn').style.display=p===1?'flex':'none';
  if(p===1){editMode=false;sel=null;selSec=null;}
}
function goCat(i){cur=i;renderP2();go(2);}
function toggleEdit(){editMode=!editMode;sel=null;selSec=null;renderP2();}
function scrollSec(si){var el=document.getElementById('sec-'+cats[cur].sections[si].id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

// ── 링크 ──
function setColLink(si,ci){
  var col=cats[cur].sections[si].cols[ci];
  var url=prompt('열 전체 링크 (비우면 삭제)',col.url||'');
  if(url===null)return;col.url=url.trim();saveData();renderP2();
}
function setSymLink(si,yi,ci,ki){
  var sec=cats[cur].sections[si];
  var chip=sec.years[yi].cells[ci][ki];
  var cur_url=chipUrl(chip);
  var msg='이 칸 개별 링크 (비우면 열 링크 사용)\n현재: '+(cur_url||'없음');
  var url=prompt(msg,cur_url);
  if(url===null)return;
  if(typeof chip==='string')sec.years[yi].cells[ci][ki]={l:chip,e:'■',url:url.trim()};
  else chip.url=url.trim();
  saveData();renderP2();
}

function handleTdClick(si,yi,ci){
  if(editMode){cellMove(si,yi,ci);}
  else{var u=cats[cur].sections[si].cols[ci].url;if(u)window.open(u,'_blank');}
}
function handleSymClick(e,si,yi,ci,ki){
  e.stopPropagation();
  if(editMode){selectSym(si,yi,ci,ki);}
  else{var sec=cats[cur].sections[si];var chip=sec.years[yi].cells[ci][ki];var u=resolveUrl(sec,ci,chip);if(u)window.open(u,'_blank');}
}

// ── 렌더 ──
function renderHNav(){
  var html='';
  cats[cur].sections.forEach(function(s,si){
    if(si>0)html+='<span class="hdiv">|</span>';
    html+='<span class="hsec" style="color:'+s.sc+'" data-si="'+si+'">'+s.icon+' '+s.label+'</span>';
  });
  document.getElementById('hnav').innerHTML=html;
  document.getElementById('hnav').querySelectorAll('.hsec').forEach(function(el){
    el.addEventListener('click',function(){scrollSec(parseInt(this.dataset.si));});
  });
}

function renderSec(sec,si){
  var h='<div class="sb" id="sec-'+sec.id+'"><div class="sh"><span style="font-size:14px">'+sec.icon+'</span><span class="sl" style="color:'+sec.sc+'">'+sec.label+'</span><button class="acb" data-si="'+si+'">+ 열 추가</button></div><table><thead><tr><th class="ty"></th>';
  sec.cols.forEach(function(col,ci){
    var pal=PALETTES[(col.palIdx||ci)%PALETTES.length];
    var hl=col.url&&col.url.length>0;
    var clwCls='cl-wrap'+(hl&&!editMode?' has-link':'');
    var clwData=hl&&!editMode?' data-si="'+si+'" data-ci="'+ci+'" data-collink="1"':'';
    h+='<th class="tc" style="background:'+pal.bg+'"><div class="'+clwCls+'"'+clwData+'>';
    h+='<div class="cl" style="color:'+pal.text+'"'+(editMode?' contenteditable="true" data-si="'+si+'" data-ci="'+ci+'"':'')+'>'+( ci+1)+'. '+col.n+'</div>';
    h+='<div class="col-acts"><button class="lbtn'+(hl?' has-link':'')+'" data-si="'+si+'" data-ci="'+ci+'">🔗 '+(hl?'수정':'추가')+'</button><button class="dcb" data-si="'+si+'" data-ci="'+ci+'">✕</button></div></div></th>';
  });
  h+='</tr></thead><tbody>';
  sec.years.forEach(function(row,yi){
    h+='<tr><td class="ry">'+row.y+'</td>';
    sec.cols.forEach(function(col,ci){
      var pal=PALETTES[(col.palIdx||ci)%PALETTES.length];
      var chips=row.cells[ci]||[];
      var isDrop=sel&&selSec===si&&!(sel.yi===yi&&sel.ci===ci);
      h+='<td class="rc'+(isDrop&&editMode?' dh':'')+'" data-si="'+si+'" data-yi="'+yi+'" data-ci="'+ci+'"><div class="sw">';
      chips.forEach(function(chip,ki){
        var isSel=sel&&selSec===si&&sel.yi===yi&&sel.ci===ci&&sel.ki===ki;
        var ownUrl=chipUrl(chip);
        var effUrl=resolveUrl(sec,ci,chip);
        var emoji=chipEmoji(chip);
        var tipTxt=chipLabel(chip)+(effUrl&&!editMode?' 🔗':'');
        var symStyle='background:'+pal.sym+';color:white;';
        // 이모지가 텍스트면 배경색, 그림문자면 투명
        var isTextSym=['■','●','◆','▲','★','♦'].indexOf(emoji)>=0||emoji.length<=1&&emoji.charCodeAt(0)<256;
        if(!isTextSym)symStyle='background:transparent;font-size:13px;';
        h+='<span class="sym'+(isSel?' sel':'')+(ownUrl?' has-own-link':'')+'" style="'+symStyle+'" data-si="'+si+'" data-yi="'+yi+'" data-ci="'+ci+'" data-ki="'+ki+'">';
        h+='<span class="tip">'+tipTxt+'</span>';
        h+=emoji;
        h+='<button class="dsb" data-si="'+si+'" data-yi="'+yi+'" data-ci="'+ci+'" data-ki="'+ki+'">✕</button>';
        h+='<button class="sym-link-btn" data-si="'+si+'" data-yi="'+yi+'" data-ci="'+ci+'" data-ki="'+ki+'">🔗</button>';
        h+='</span>';
      });
      h+='<button class="asb" data-si="'+si+'" data-yi="'+yi+'" data-ci="'+ci+'">+</button></div></td>';
    });
    h+='</tr>';
  });
  h+='<tr><td colspan="'+(sec.cols.length+1)+'" style="border:none;padding:2px 8px;"><button class="ayb" data-si="'+si+'">+ 연도 추가</button></td></tr></tbody></table></div><div class="sd"></div>';
  return h;
}

function bindTw(){
  var tw=document.getElementById('tw');
  tw.querySelectorAll('.cl-wrap[data-collink]').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('.col-acts'))return;
      var u=cats[cur].sections[+this.dataset.si].cols[+this.dataset.ci].url;
      if(u)window.open(u,'_blank');
    });
  });
  tw.querySelectorAll('.acb').forEach(function(el){el.addEventListener('click',function(){openColModal(+this.dataset.si);});});
  tw.querySelectorAll('.lbtn').forEach(function(el){el.addEventListener('click',function(){setColLink(+this.dataset.si,+this.dataset.ci);});});
  tw.querySelectorAll('.dcb').forEach(function(el){el.addEventListener('click',function(){delCol(+this.dataset.si,+this.dataset.ci);});});
  tw.querySelectorAll('.ayb').forEach(function(el){el.addEventListener('click',function(){addYear(+this.dataset.si);});});
  tw.querySelectorAll('.rc').forEach(function(el){el.addEventListener('click',function(){handleTdClick(+this.dataset.si,+this.dataset.yi,+this.dataset.ci);});});
  tw.querySelectorAll('.sym').forEach(function(el){el.addEventListener('click',function(e){handleSymClick(e,+this.dataset.si,+this.dataset.yi,+this.dataset.ci,+this.dataset.ki);});});
  tw.querySelectorAll('.dsb').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();delChip(+this.dataset.si,+this.dataset.yi,+this.dataset.ci,+this.dataset.ki);});});
  tw.querySelectorAll('.sym-link-btn').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();setSymLink(+this.dataset.si,+this.dataset.yi,+this.dataset.ci,+this.dataset.ki);});});
  tw.querySelectorAll('.asb').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openChipModal(+this.dataset.si,+this.dataset.yi,+this.dataset.ci);});});
  tw.querySelectorAll('.cl[contenteditable]').forEach(function(el){el.addEventListener('blur',function(){saveCol(+this.dataset.si,+this.dataset.ci,this);});});
}

function renderP2(){
  var c=cats[cur];
  var pal=PALETTES[c.palIdx%PALETTES.length];
  document.getElementById('p2b').textContent=c.label+'. '+c.name;
  document.getElementById('p2b').style.cssText='background:'+pal.bg+';color:'+pal.text+';';
  var btn=document.getElementById('ebt');
  btn.className='ebtn'+(editMode?' on':'');
  btn.innerHTML=editMode?'<i class="ti ti-check"></i> 완료':'<i class="ti ti-edit"></i> 편집';
  document.getElementById('p2').className='pg on'+(editMode?' edit-mode':'');
  renderHNav();
  var html='';
  c.sections.forEach(function(s,si){html+=renderSec(s,si);});
  document.getElementById('tw').innerHTML=html;
  bindTw();
}

function saveCol(si,ci,el){cats[cur].sections[si].cols[ci].n=el.textContent.trim().replace(/^\d+\.\s*/,'');saveData();}
function selectSym(si,yi,ci,ki){
  if(sel&&selSec===si&&sel.yi===yi&&sel.ci===ci&&sel.ki===ki){sel=null;selSec=null;}
  else{sel={yi:yi,ci:ci,ki:ki};selSec=si;}
  renderP2();
}
function cellMove(si,yi,ci){
  if(!sel||selSec!==si||(sel.yi===yi&&sel.ci===ci))return;
  var sec=cats[cur].sections[si];
  var chip=sec.years[sel.yi].cells[sel.ci].splice(sel.ki,1)[0];
  if(!sec.years[yi].cells[ci])sec.years[yi].cells[ci]=[];
  sec.years[yi].cells[ci].push(chip);
  sel=null;selSec=null;saveData();renderP2();
}
function delChip(si,yi,ci,ki){cats[cur].sections[si].years[yi].cells[ci].splice(ki,1);sel=null;selSec=null;saveData();renderP2();}
function delCol(si,ci){if(!confirm('삭제?'))return;var sec=cats[cur].sections[si];sec.cols.splice(ci,1);sec.years.forEach(function(r){r.cells.splice(ci,1);});saveData();renderP2();}
function addYear(si){var y=prompt("연도 (예: 21')");if(!y)return;var sec=cats[cur].sections[si];sec.years.push({y:y,cells:sec.cols.map(function(){return[];})});saveData();renderP2();}

// ── 이벤트 ──
document.getElementById('backBtn').addEventListener('click',function(){go(1);});
document.getElementById('ebt').addEventListener('click',function(){toggleEdit();});
document.getElementById('p1EditBtn').addEventListener('click',function(){openP1Modal();});

['p1modal','colModal','chipModal'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
});

// ── Firebase에서 로드 후 시작 ──
showToast('⏳ 불러오는 중...');
loadData().then(function(data){
  cats=data;
  renderP1();
  showToast('✓ 완료');
});
</script>
</body>
</html>
